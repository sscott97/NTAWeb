<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NTA Web App{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Theme stylesheet — swapped synchronously before first paint to avoid flash -->
  <link id="theme-stylesheet" rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script>
    (function () {
      var themeMap = {
        'light':  'styles-light.css',
        'theme3': 'styles-theme3.css',
        'theme4': 'styles-theme4.css',
        'dark':   'styles.css'
      };
      var theme = localStorage.getItem('nta-theme') || 'dark';
      var css   = themeMap[theme] || 'styles.css';
      var link  = document.getElementById('theme-stylesheet');
      // Strip everything after the last '/' and replace with correct filename
      // This is robust regardless of what the href currently contains
      link.href = link.href.replace(/\/[^\/]+\.css(\?.*)?$/, '/' + css);
    })();
  </script>
</head>
<body>

  <nav class="navbar navbar-expand-lg border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold text-success" href="{{ url_for('index') }}">NTA Web App</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="{{ url_for('index') }}">Home</a>
        <a class="nav-link" href="{{ url_for('settings') }}">Settings</a>
        <a class="nav-link" href="{{ url_for('help_page') }}">Help</a>
        <a class="nav-link" href="https://platemap.onrender.com" target="_blank" style="color: #388bfd;">Plate Mapper</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
