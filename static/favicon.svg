<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1e19"/>

  <!-- Axes -->
  <line x1="5" y1="27" x2="28" y2="27" stroke="#4a7a47" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="5" y1="4"  x2="5"  y2="27" stroke="#4a7a47" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Data points and connecting lines (declining neutralisation curve) -->
  <!-- Points: (8,7), (13,12), (19,20), (25,24) -->
  <polyline points="8,7 13,12 19,20 25,24"
            fill="none" stroke="#66bb6a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- NT50 reference line (horizontal dashed at y=16, midpoint between top and bottom) -->
  <line x1="5" y1="16" x2="22" y2="16"
        stroke="#a5d6a7" stroke-width="0.9" stroke-dasharray="2,2" opacity="0.8"/>

  <!-- Interpolated x position: between (13,12) and (19,20), y=16 → x≈16.5 -->
  <!-- Drop line (vertical dashed from interpolated point down to x-axis) -->
  <line x1="16.5" y1="16" x2="16.5" y2="27"
        stroke="#a5d6a7" stroke-width="0.9" stroke-dasharray="2,2" opacity="0.8"/>

  <!-- Interpolated point (hollow circle on the line) -->
  <circle cx="16.5" cy="16" r="2.2" fill="#1a1e19" stroke="#ffffff" stroke-width="1.3"/>

  <!-- Data point circles (filled) -->
  <circle cx="8"  cy="7"  r="1.6" fill="#66bb6a"/>
  <circle cx="13" cy="12" r="1.6" fill="#66bb6a"/>
  <circle cx="19" cy="20" r="1.6" fill="#66bb6a"/>
  <circle cx="25" cy="24" r="1.6" fill="#66bb6a"/>
</svg>
